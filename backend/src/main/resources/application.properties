spring.application.name=backend

# 1. SUPABASE (POSTGRESQL) VERİTABANI BAĞLANTISI
# ===============================
# Gerçek değerler application-local.properties dosyasında saklanır (git'e gitmez).
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# 2. HIBERNATE / JPA AYARLARI
# ===============================
# DİKKAT: Tabloları SQL dosyasıyla kendimiz oluşturduğumuz için burası kesinlikle 'none' veya 'validate' olmalı.
# 'update' yaparsak Spring kendi kafasına göre tabloları değiştirmeye çalışır ve mimarimiz bozulur.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# 3. REDIS (ÖNBELLEK VE SEPET) AYARLARI
# ===============================
# Docker üzerinde standart portta (6379) çalıştığı için bu varsayılan ayarlar yeterlidir.
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===============================
# 4. UYGULAMA PORTU
# ===============================
server.port=8080

# ===============================
# 5. CLERK JWT & GÜVENLİK AYARLARI
# ===============================
# Clerk Dashboard > API Keys > JWKS URL bölümünden alınır.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_JWKS_URI}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${CLERK_ISSUER_URI}

# ===============================
# 6. CLERK WEBHOOK GİZLİ ANAHTARI
# ===============================
# Clerk Dashboard > Webhooks > Signing Secret bölümünden alınır.
app.clerk.webhook-secret=${CLERK_WEBHOOK_SECRET}

# ===============================
# 7. CORS AYARLARI
# ===============================
# Next.js geliştirme ortamı: localhost:3000
# Production ortamı: gerçek domain adresi ortam değişkeninden okunur.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ===============================
# 8. YEREL GELİŞTİRME PROFİLİ
# ===============================
# application-local.properties dosyasındaki değerleri yükler (git'e gitmez).
spring.profiles.active=local
