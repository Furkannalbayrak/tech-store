spring.application.name=backend

# 1. SUPABASE (POSTGRESQL) VERİTABANI BAĞLANTISI
# ===============================
spring.datasource.url=jdbc:postgresql://aws-1-eu-central-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.taholfwkjymyuvflxpnr
spring.datasource.password=zFiUB272qh671NYI
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# 2. HIBERNATE / JPA AYARLARI
# ===============================
# DİKKAT: Tabloları SQL dosyasıyla kendimiz oluşturduğumuz için burası kesinlikle 'none' veya 'validate' olmalı.
# 'update' yaparsak Spring kendi kafasına göre tabloları değiştirmeye çalışır ve mimarimiz bozulur.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# 3. REDIS (ÖNBELLEK VE SEPET) AYARLARI
# ===============================
# Docker üzerinde standart portta (6379) çalıştığı için bu varsayılan ayarlar yeterlidir.
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===============================
# 4. UYGULAMA PORTU
# ===============================
server.port=8080

# ===============================
# 5. CLERK JWT & GÜVENLİK AYARLARI
# ===============================
# Clerk Dashboard > API Keys > JWKS URL bölümünden alınır.
# Format: https://<your-clerk-domain>.clerk.accounts.dev/.well-known/jwks.json
# Spring Security bu endpoint'ten public key'leri çekip JWT imzalarını doğrular.
# Değeri .env veya ortam değişkeninden okutmak için ${CLERK_JWKS_URI} kullan.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://distinct-gull-81.clerk.accounts.dev/.well-known/jwks.json

# Clerk JWT'nin "issuer" alanı. Clerk Dashboard'daki Frontend API URL ile eşleşmelidir.
# Bu doğrulama, başka bir sistemden üretilmiş JWT'lerin kabul edilmesini önler.
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://distinct-gull-81.clerk.accounts.dev

# ===============================
# 6. CLERK WEBHOOK GİZLİ ANAHTARI
# ===============================
# Clerk Dashboard > Webhooks > Signing Secret bölümünden alınır.
# Gelen webhook isteklerinin gerçekten Clerk'ten geldiğini doğrulamak için kullanılır.
# Svix kütüphanesi bu secret ile imza doğrulaması yapar (ilerideki adımda devreye girer).
app.clerk.webhook-secret=${CLERK_WEBHOOK_SECRET:whsec_placeholder}  # bunu daha yapmadık !!!!!

# ===============================
# 7. CORS AYARLARI
# ===============================
# Next.js geliştirme ortamı: localhost:3000
# Production ortamı: gerçek domain adresi ortam değişkeninden okunur.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
